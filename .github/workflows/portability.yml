name: Portability

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - develop
  schedule:
    - cron: "22 22 * * 0"

jobs:
  build-and-test:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'ci:off') }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: jammy.portability-dev
            extra-build-args: ""
          - image: jammy.portability-dev
            extra-build-args: "-DChaste_USE_CVODE=OFF -DChaste_USE_VTK=OFF"
          - image: focal.portability-system
            extra-build-args: ""
          - image: jammy.portability-system
            extra-build-args: ""
          - image: noble.portability-system
            extra-build-args: ""

    runs-on: ubuntu-latest

    container:
      image: chaste/runner:${{ matrix.image }}
      env:
        RUNNER_OFF: 1
      options: --user 0

    env:
      CC: gcc
      CXX: g++

    defaults:
      run:
        shell: bash --login -e -o pipefail {0} # login for environment modules

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: compiler version
        run: |
          ${CXX} --version

      - name: Make build and test directories
        run: |
          mkdir -p chaste-build-dir
          mkdir -p chaste-test-dir
          echo "CHASTE_TEST_OUTPUT=$(pwd)/chaste-test-dir" >> ${GITHUB_ENV}

      - name: Create module loading script
        run: |
          cat > load_modules.sh << 'EOF'
          #!/bin/bash
          module use /home/runner/modules/modulefiles
          module load boost petsc_hdf5 sundials vtk xercesc xsd
          EOF
        working-directory: chaste-build-dir

      - name: Authorize runner user
        run: |
          chown -R runner:runner .

      - name: Configure
        run: |
          su runner << 'EOF'
          source load_modules.sh
          cmake -DCMAKE_BUILD_TYPE=Release ${{ matrix.extra-build-args }} ..
          EOF
        working-directory: chaste-build-dir

      - name: TestChasteBuildInfo
        run: |
          su runner << 'EOF'
          source load_modules.sh
          cmake --build . --target TestChasteBuildInfo --parallel $(nproc)
          ctest -V -R TestChasteBuildInfo$ --output-on-failure
          EOF
        working-directory: chaste-build-dir

      - name: Build Continuous
        run: |
          su runner << 'EOF'
          source load_modules.sh
          cmake --build . --target Continuous --parallel $(nproc)
          EOF
        working-directory: chaste-build-dir

      - name: Build Nightly
        run: |
          su runner << 'EOF'
          source load_modules.sh
          cmake --build . --target Nightly --parallel $(nproc)
          EOF
        working-directory: chaste-build-dir

      - name: Run Continuous
        run: |
          su runner << 'EOF'
          source load_modules.sh
          ctest -j $(nproc) -L Continuous --output-on-failure
          EOF
        working-directory: chaste-build-dir

      - name: Run Nightly
        run: |
          su runner << 'EOF'
          source load_modules.sh
          ctest -j $(nproc) -L Nightly --output-on-failure
          EOF
        working-directory: chaste-build-dir
